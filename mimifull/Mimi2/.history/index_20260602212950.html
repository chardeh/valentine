<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>For Mimi</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet"/>
<style>
:root {
  --water: #1a4a6e;
  --water-light: #2a7da8;
  --water-pale: #a8d8ea;
  --fire-gold: #e8a735;
  --gold: #f0c060;
  --frangipani: #f8e1b4;
  --hydrangea: #7b9bc8;
  --dark: #080f1a;
  --darker: #040a12;
  --rose: #e8a0b4;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; font-family: "Cormorant Garamond", serif; background: var(--darker); cursor: none; }

/* CURSOR */
.cursor { position: fixed; width: 11px; height: 11px; background: var(--gold); border-radius: 50%; pointer-events: none; z-index: 9999; transform: translate(-50%,-50%); mix-blend-mode: screen; transition: transform .15s; }
.cursor-trail { position: fixed; width: 5px; height: 5px; border: 1px solid rgba(168,216,234,.5); border-radius: 50%; pointer-events: none; z-index: 9998; transform: translate(-50%,-50%); opacity: .4; }

/* PAGES */
.page { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 1.3s cubic-bezier(.4,0,.2,1); overflow: hidden; }
.page.active { opacity: 1; pointer-events: all; }

/* BACKGROUNDS */
.bg1 { background: radial-gradient(ellipse at 15% 85%, #0d2a45 0%, #080f1a 40%, #0d0810 100%); }
.bg2 { background: radial-gradient(ellipse at 70% 25%, #050e1c 0%, #080f1a 50%, #100808 100%); }
.bg3 { background: radial-gradient(ellipse at 85% 15%, #130508 0%, #080f1a 40%, #060d0a 100%); }
.bg4 { background: radial-gradient(ellipse at 50% 5%, #0e0518 0%, #080f1a 55%, #051828 100%); }
.bg5 { background: radial-gradient(ellipse at 20% 80%, #051828 0%, #080f1a 50%, #180508 100%); }
.bg6 { background: radial-gradient(ellipse at 60% 40%, #0a0818 0%, #04080e 60%, #0a0a18 100%); }
.bg7 { background: radial-gradient(ellipse at 30% 70%, #051220 0%, #080f1a 50%, #0d0510 100%); }
.bg8 { background: radial-gradient(ellipse at 50% 50%, #04080e 0%, #080f1a 100%); }

.grad-ov { position: absolute; inset: 0; background: linear-gradient(135deg, rgba(42,125,168,.05) 0%, transparent 50%, rgba(200,96,42,.05) 100%); animation: gshift 8s ease-in-out infinite alternate; pointer-events: none; }
@keyframes gshift { from { opacity: .3; } to { opacity: 1; } }

canvas { position: absolute; inset: 0; pointer-events: none; z-index: 1; }

/* WAVES */
.waves { position: absolute; bottom: 0; left: 0; width: 100%; pointer-events: none; z-index: 2; }
.wave { position: absolute; bottom: -10px; left: -50%; width: 200%; height: 80px; border-radius: 50%; animation: wv ease-in-out infinite; }
.wave:nth-child(1) { background: rgba(42,125,168,.07); animation-duration: 7s; }
.wave:nth-child(2) { background: rgba(26,74,110,.05); animation-duration: 10s; animation-delay: -3s; height: 60px; }
.wave:nth-child(3) { background: rgba(10,30,55,.04); animation-duration: 13s; animation-delay: -6s; height: 50px; }
@keyframes wv { 0%,100% { transform: translateX(0) scaleY(1); } 50% { transform: translateX(8%) scaleY(1.5); } }

/* CONTENT */
.content { position: relative; z-index: 10; max-width: 680px; width: 94%; text-align: center; padding: 1.6rem 1.5rem; }
.ci { animation: fadeUp 1.1s cubic-bezier(.2,.8,.4,1) both; }
@keyframes fadeUp { from { transform: translateY(38px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

/* TYPE */
.title { font-family: "Cinzel Decorative", serif; font-size: clamp(1.3rem, 4.5vw, 2.6rem); color: var(--gold); text-shadow: 0 0 40px rgba(240,192,96,.4); margin-bottom: .5rem; letter-spacing: .04em; line-height: 1.25; }
.title-sm { font-size: clamp(1.05rem, 3.2vw, 1.9rem); }
.sub { font-family: "IM Fell English", serif; font-size: clamp(.92rem, 2.6vw, 1.3rem); color: var(--water-pale); font-style: italic; margin-bottom: .35rem; }
.body { font-family: "Cormorant Garamond", serif; font-size: clamp(.98rem, 2.5vw, 1.28rem); color: rgba(255,255,255,.82); line-height: 2; margin: .6rem 0; }
.quote { font-family: "IM Fell English", serif; font-size: clamp(.88rem, 2.3vw, 1.2rem); color: var(--fire-gold); text-shadow: 0 0 20px rgba(232,167,53,.3); margin: 1.1rem 0; padding: .9rem 1.4rem; border-top: 1px solid rgba(232,167,53,.28); border-bottom: 1px solid rgba(232,167,53,.28); font-style: italic; line-height: 1.75; }
.accent { color: var(--gold); }
.bl { color: var(--water-pale); }
.fire-t { color: var(--fire-gold); }

/* DIVIDER */
.dv { display: flex; align-items: center; gap: .8rem; margin: .5rem 0; }
.dv::before, .dv::after { content: ""; flex: 1; height: 1px; background: linear-gradient(to right, transparent, rgba(240,192,96,.22), transparent); }
.dv-i { color: var(--gold); font-size: .82rem; opacity: .65; }

/* BUTTON */
.btn { margin-top: 1.3rem; display: inline-block; padding: .7rem 1.9rem; background: transparent; border: 1px solid rgba(240,192,96,.45); color: var(--gold); font-family: "Cinzel Decorative", serif; font-size: .7rem; letter-spacing: .15em; cursor: none; position: relative; overflow: hidden; text-transform: uppercase; transition: all .4s; }
.btn::before { content: ""; position: absolute; inset: 0; background: linear-gradient(135deg, rgba(240,192,96,.13), rgba(232,167,53,.08)); transform: translateX(-100%); transition: transform .4s cubic-bezier(.4,0,.2,1); }
.btn:hover { border-color: var(--gold); box-shadow: 0 0 28px rgba(240,192,96,.18); }
.btn:hover::before { transform: translateX(0); }
.btn-w { border-color: rgba(168,216,234,.38); color: var(--water-pale); }
.btn-w::before { background: linear-gradient(135deg, rgba(168,216,234,.09), rgba(42,125,168,.06)); }
.btn-w:hover { border-color: var(--water-pale); box-shadow: 0 0 28px rgba(168,216,234,.18); }

/* NAV DOTS */
.dots { position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%); display: flex; gap: .65rem; z-index: 100; }
.dot { width: 6px; height: 6px; border-radius: 50%; background: rgba(255,255,255,.14); transition: all .4s cubic-bezier(.4,0,.2,1); cursor: none; border: 1px solid transparent; }
.dot.on { background: var(--gold); transform: scale(1.5); border-color: rgba(240,192,96,.28); box-shadow: 0 0 9px rgba(240,192,96,.4); }
.dot:hover { background: rgba(240,192,96,.38); }

/* PROGRESS */
.progress { position: fixed; top: 0; left: 0; height: 2px; background: linear-gradient(to right, var(--water-pale), var(--gold), var(--fire-gold)); transition: width .8s cubic-bezier(.4,0,.2,1); z-index: 200; box-shadow: 0 0 8px rgba(240,192,96,.35); }

/* FLOWERS */
.flower-layer { position: absolute; inset: 0; pointer-events: none; overflow: hidden; z-index: 3; }
.float-flower { position: absolute; animation: fsway ease-in-out infinite; object-fit: contain; }
@keyframes fsway { 0%,100% { transform: rotate(-5deg) translateY(0) scale(1); } 33% { transform: rotate(3deg) translateY(-8px) scale(1.03); } 66% { transform: rotate(-2deg) translateY(-4px) scale(.98); } }

/* PHOTO CARD */
.photo-card { position: relative; margin: 0 auto .9rem; flex-shrink: 0; border-radius: 2px; }
.photo-card img { width: 100%; height: 100%; object-fit: cover; object-position: center top; display: block; border-radius: 2px; filter: saturate(1.08) brightness(1.04); }
.photo-glow { position: absolute; inset: -18px; border-radius: 4px; animation: pglow 3.5s ease-in-out infinite; z-index: -1; }
@keyframes pglow { 0%,100% { opacity: .3; box-shadow: 0 0 20px rgba(240,192,96,.1); } 50% { opacity: .9; box-shadow: 0 0 45px rgba(240,192,96,.35); } }
.photo-border { position: absolute; inset: -8px; border: 1px solid rgba(240,192,96,.28); border-radius: 3px; animation: pborder 4s ease-in-out infinite; }
@keyframes pborder { 0%,100% { box-shadow: 0 0 12px rgba(240,192,96,.08); } 50% { box-shadow: 0 0 30px rgba(240,192,96,.28); } }
.fc { position: absolute; width: 15px; height: 15px; border-color: var(--gold); border-style: solid; opacity: .85; }
.fc.tl { top: -16px; left: -16px; border-width: 2px 0 0 2px; }
.fc.tr { top: -16px; right: -16px; border-width: 2px 2px 0 0; }
.fc.bl { bottom: -16px; left: -16px; border-width: 0 0 2px 2px; }
.fc.br { bottom: -16px; right: -16px; border-width: 0 2px 2px 0; }

/* TAGS */
.tags { display: flex; flex-wrap: wrap; gap: .55rem; justify-content: center; margin: .8rem 0; }
.tag { padding: .38rem .9rem; border-radius: 30px; font-family: "Cormorant Garamond", serif; font-style: italic; font-size: clamp(.86rem,2.1vw,1.02rem); animation: tagb ease-in-out infinite; transition: transform .3s; cursor: none; }
.tag:hover { transform: translateY(-3px) scale(1.05)!important; }
.tag:nth-child(odd) { background: rgba(240,192,96,.07); border: 1px solid rgba(240,192,96,.22); color: var(--frangipani); }
.tag:nth-child(even) { background: rgba(123,155,200,.07); border: 1px solid rgba(123,155,200,.22); color: var(--water-pale); }
@keyframes tagb { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-4px); } }

/* BADGES */
.badge { display: inline-block; padding: .28rem .85rem; border-radius: 20px; font-size: .7rem; letter-spacing: .12em; text-transform: uppercase; margin: .2rem; font-family: "Cinzel Decorative", serif; }
.bw { background: rgba(26,74,110,.3); border: 1px solid rgba(168,216,234,.28); color: var(--water-pale); }
.bf { background: rgba(200,96,42,.18); border: 1px solid rgba(232,167,53,.28); color: var(--fire-gold); }

/* SNORLAX */
.snorlax-frame { position: relative; width: min(200px,55vw); margin: 0 auto .8rem; }
.snorlax-frame img { width: 100%; border-radius: 8px; filter: drop-shadow(0 0 25px rgba(168,216,234,.35)) saturate(1.2); }
.snorlax-badge { position: absolute; top: -10px; right: -10px; background: rgba(42,125,168,.7); border: 1px solid var(--water-pale); color: var(--water-pale); font-family: "Cinzel Decorative", serif; font-size: .55rem; letter-spacing: .1em; padding: .3rem .6rem; border-radius: 20px; backdrop-filter: blur(4px); }

/* MUSIC PLAYER */
.player { position: fixed; bottom: 3.5rem; left: 50%; transform: translateX(-50%); z-index: 150; width: min(380px, 92vw); background: rgba(4,8,14,.85); border: 1px solid rgba(240,192,96,.2); backdrop-filter: blur(20px); border-radius: 3px; padding: .9rem 1.1rem; }
.player-top { display: flex; align-items: center; gap: .8rem; margin-bottom: .7rem; }
.player-art { width: 42px; height: 42px; border-radius: 2px; border: 1px solid rgba(240,192,96,.25); object-fit: cover; flex-shrink: 0; filter: saturate(1.1); }
.player-info { flex: 1; min-width: 0; text-align: left; }
.player-song { font-family: "Cinzel Decorative", serif; font-size: .65rem; color: var(--gold); letter-spacing: .08em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.player-artist { font-family: "IM Fell English", serif; font-size: .72rem; color: rgba(168,216,234,.6); font-style: italic; margin-top: .1rem; }
.player-controls { display: flex; align-items: center; gap: .7rem; justify-content: center; margin-bottom: .6rem; }
.pc-btn { background: none; border: none; color: rgba(255,255,255,.5); font-size: 1rem; cursor: none; transition: color .25s, transform .2s; padding: .2rem .4rem; }
.pc-btn:hover { color: var(--gold); transform: scale(1.15); }
.pc-play { width: 34px; height: 34px; border-radius: 50%; border: 1px solid rgba(240,192,96,.45); color: var(--gold); display: flex; align-items: center; justify-content: center; font-size: 1rem; cursor: none; background: rgba(240,192,96,.06); transition: all .3s; }
.pc-play:hover { background: rgba(240,192,96,.18); border-color: var(--gold); box-shadow: 0 0 16px rgba(240,192,96,.25); }
.progress-bar { height: 2px; background: rgba(255,255,255,.1); border-radius: 1px; cursor: none; position: relative; }
.progress-fill { height: 100%; background: linear-gradient(to right, var(--water-pale), var(--gold)); border-radius: 1px; transition: width .5s linear; width: 0%; }
.progress-dot { position: absolute; right: calc(100% - var(--pct, 0%)); top: 50%; transform: translate(50%,-50%); width: 8px; height: 8px; border-radius: 50%; background: var(--gold); box-shadow: 0 0 6px rgba(240,192,96,.6); display: none; }
.player-times { display: flex; justify-content: space-between; margin-top: .3rem; font-family: "Cormorant Garamond", serif; font-size: .68rem; color: rgba(255,255,255,.3); }
.track-list { margin-top: .65rem; border-top: 1px solid rgba(255,255,255,.06); padding-top: .55rem; display: flex; flex-direction: column; gap: .3rem; }
.track-item { display: flex; align-items: center; gap: .6rem; padding: .3rem .4rem; border-radius: 2px; cursor: none; transition: background .2s; }
.track-item:hover { background: rgba(240,192,96,.06); }
.track-item.active { background: rgba(240,192,96,.1); }
.track-num { font-family: "Cormorant Garamond", serif; font-size: .72rem; color: rgba(255,255,255,.25); width: 14px; text-align: right; flex-shrink: 0; }
.track-item.active .track-num { color: var(--gold); }
.track-name { font-family: "Cormorant Garamond", serif; font-size: .82rem; color: rgba(255,255,255,.55); flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; text-align: left; }
.track-item.active .track-name { color: var(--gold); }
.track-dur { font-family: "Cormorant Garamond", serif; font-size: .72rem; color: rgba(255,255,255,.2); flex-shrink: 0; }
.eq-bars { display: flex; align-items: flex-end; gap: 1.5px; height: 12px; flex-shrink: 0; }
.eq-bar { width: 2px; background: var(--gold); border-radius: 1px; animation: eq ease-in-out infinite; }
.eq-bar:nth-child(1) { animation-duration: .6s; height: 8px; }
.eq-bar:nth-child(2) { animation-duration: .8s; animation-delay: .15s; height: 12px; }
.eq-bar:nth-child(3) { animation-duration: .5s; animation-delay: .3s; height: 6px; }
@keyframes eq { 0%,100% { transform: scaleY(.3); } 50% { transform: scaleY(1); } }
.player-toggle { position: fixed; bottom: 3.5rem; right: 1rem; z-index: 151; background: rgba(4,8,14,.8); border: 1px solid rgba(240,192,96,.22); color: var(--gold); width: 38px; height: 38px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: none; backdrop-filter: blur(8px); font-size: .9rem; transition: all .3s; }
.player-toggle:hover { border-color: var(--gold); box-shadow: 0 0 16px rgba(240,192,96,.2); }
.player.hidden { opacity: 0; pointer-events: none; transform: translateX(-50%) translateY(8px); transition: all .4s; }

/* HEART BURST */
@keyframes heartBurst { 0% { transform: translate(-50%,-50%) scale(0) rotate(0); opacity: 1; } 100% { transform: translate(calc(-50% + var(--tx)), calc(-50% + var(--ty))) scale(1) rotate(var(--rot)); opacity: 0; } }

/* GLOWS */
@keyframes glowP { 0%,100% { text-shadow: 0 0 20px rgba(240,192,96,.25); } 50% { text-shadow: 0 0 55px rgba(240,192,96,.7), 0 0 100px rgba(240,192,96,.25); } }
.glow-a { animation: glowP 3.5s ease-in-out infinite; }
.love-declaration { font-family: "Cinzel Decorative", serif; font-size: clamp(1.1rem, 3.5vw, 1.8rem); color: var(--gold); animation: glowP 2.5s ease-in-out infinite; line-height: 1.5; margin: 1rem 0; }

.scroll-hint { position: fixed; bottom: 4rem; left: 50%; transform: translateX(-50%); color: rgba(255,255,255,.18); font-family: "Cormorant Garamond", serif; font-size: .75rem; letter-spacing: .18em; text-transform: uppercase; animation: shint 4s ease-in-out infinite 4s; z-index: 50; pointer-events: none; }
@keyframes shint { 0%,100% { opacity: 0; } 50% { opacity: .4; } }
</style>
</head>
